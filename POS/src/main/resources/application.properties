spring.application.name=POS
server.port=9102

# database connection setting
spring.datasource.url=jdbc:mysql://192.168.100.100:3306/posservice
spring.datasource.username=root
spring.datasource.password=12345678
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
# Badilisha hapa iendane na MySQL yako
spring.jpa.database-platform=org.hibernate.dialect.MariaDBDialect

spring.jpa.show-sql=true
# Ongeza hizi mbili kwa ajili ya speed ya updates
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_updates=true

spring.jpa.properties.hibernate.default_batch_fetch_size=20
spring.datasource.hikari.maximum-pool-size=15
spring.jpa.open-in-view=false
logging.level.org.hibernate.SQL=DEBUG

# Hii itatua ile kosa la session table missing
spring.session.store-type=none
